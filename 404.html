<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="apple-itunes-app" content="app-id=6751245004">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --ink: #0F172A; --muted: #64748B; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(ellipse at top, #f0f9ff 0%, #e0f2fe 35%, #bae6fd 100%);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
      box-sizing: border-box;
    }
    .card {
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      background: linear-gradient(135deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.4) 100%);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 32px 64px -12px rgba(0,0,0,0.12);
      border-radius: 2rem;
      padding: 3rem 2rem;
      max-width: 28rem;
    }
    .card img { width: 6rem; height: 6rem; border-radius: 1.25rem; }
    h1 { font-weight: 900; font-size: 2rem; margin: 1.25rem 0 0.5rem; letter-spacing: -0.02em; }
    p { color: var(--muted); line-height: 1.6; margin: 0 0 1.5rem; }
    .links { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; }
    .links a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border-radius: 1rem;
      background: linear-gradient(145deg, #f0f9ff, #e0f2fe);
      box-shadow: 6px 6px 12px rgba(0,0,0,0.06), -3px -3px 8px rgba(255,255,255,0.3);
      color: var(--ink);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icon-192.png" alt="Cold Call X app icon" width="192" height="192">
    <h1>Page not found</h1>
    <p>This page doesn't exist — but the auto dialer for iPhone does.</p>
    <div class="links">
      <a href="/">Back to Home</a>
      <a href="https://apps.apple.com/us/app/cold-call-x/id6751245004?uo=2" rel="noopener noreferrer">Get the App</a>
    </div>
  </div>
</body>
</html>
