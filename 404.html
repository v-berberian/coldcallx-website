<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>Page Not Found — Cold Call X</title>
  <meta name="apple-itunes-app" content="app-id=6751245004">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600..800&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --paper: #FAF7F2; --card: #FFFDF9; --ink: #16140F; --muted: #6F6A60; --line: #E3DDD1; --orange: #F7941E; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Instrument Sans', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--paper);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
      box-sizing: border-box;
    }
    ::selection { background: var(--orange); color: var(--paper); }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 3rem 2.25rem;
      max-width: 26rem;
    }
    .card img { width: 84px; height: 84px; border-radius: 20px; border: 1px solid var(--line); }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    h1 { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 2.2rem; letter-spacing: -0.03em; margin: 1.1rem 0 0.5rem; }
    p { color: var(--muted); line-height: 1.6; margin: 0 0 1.6rem; }
    .links { display: flex; flex-wrap: wrap; gap: 0.65rem; justify-content: center; }
    .links a {
      display: inline-block;
      padding: 0.7rem 1.4rem;
      border-radius: 999px;
      background: var(--ink);
      color: var(--paper);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background-color .25s ease;
    }
    .links a:hover { background: var(--orange); }
    .links a.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
    .links a.ghost:hover { border-color: var(--orange); background: transparent; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icon-192.png" alt="Cold Call X app icon" width="192" height="192">
    <p class="mono" style="margin:1.2rem 0 0">404</p>
    <h1>Page not found</h1>
    <p>This page doesn't exist. The auto dialer for iPhone does.</p>
    <div class="links">
      <a class="ghost" href="/">Back to home</a>
      <a href="https://apps.apple.com/us/app/cold-call-x/id6751245004?uo=2" rel="noopener noreferrer">Get the app</a>
    </div>
  </div>
</body>
</html>
